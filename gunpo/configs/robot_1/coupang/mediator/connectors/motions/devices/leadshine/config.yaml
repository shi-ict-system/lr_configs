######################################
# left motor 0번으로 는 cw 방향일 때 엔코더 +값이 나와야 한다.
#
######################################

comms:
  address: /dev/pcanusb32
  id:
    left: 0
    right: 1


######################################
#
######################################
mechanical:
  gear_ratio: 19


######################################
# direction
# 0 : cw
# 1 : ccw
######################################
motors:
  left:
    count_per_revolution: 10000
    direction: 1
  right:
    count_per_revolution: 10000
    direction: 1
